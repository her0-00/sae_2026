{% extends "base.html" %}
{% block title %}Carte des prix — ImmoBI{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  .page-layout { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 57px); }
  @media (max-width: 768px) { .page-layout { grid-template-columns: 1fr; } }

  .sidebar {
    background: var(--color-surface);
    border-right: 1px solid var(--color-border);
    padding: 1.2rem;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .sidebar h2 { font-size: 1rem; font-weight: 600; }

  #map { flex: 1; }

  .legend {
    background: #fff; padding: .75rem 1rem;
    border-radius: var(--radius); box-shadow: var(--shadow);
    font-size: .8rem; line-height: 1.8;
  }
  .legend-item { display: flex; align-items: center; gap: .5rem; }
  .legend-swatch { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }

  .popup-title  { font-weight: 700; font-size: .95rem; margin-bottom: .3rem; }
  .popup-prix   { font-size: 1.2rem; font-weight: 700; color: var(--color-primary); }
  .popup-sub    { font-size: .8rem; color: var(--color-muted); }
</style>
{% endblock %}

{% block content %}
<div class="page-layout">
  <aside class="sidebar">
    <h2>Filtres</h2>
    <div class="form-group">
      <label>Type de bien</label>
      <select id="filter-type">
        <option value="Appartement">Appartement</option>
        <option value="Maison">Maison</option>
      </select>
    </div>
    <div class="form-group">
      <label>Département</label>
      <input id="filter-dept" type="text" placeholder="ex: 69" maxlength="3" />
    </div>
    <div class="form-group">
      <label>Année</label>
      <select id="filter-annee">
        <option value="">Dernière disponible</option>
        <option value="2024">2024</option>
        <option value="2023">2023</option>
        <option value="2022">2022</option>
        <option value="2021">2021</option>
      </select>
    </div>
    <button class="btn btn-primary" id="btn-load">Charger la carte</button>

    <div id="sidebar-info" style="margin-top:.5rem;"></div>

    <div class="legend" id="legend" style="display:none;">
      <strong style="display:block;margin-bottom:.5rem;">Prix/m² médian</strong>
      <div class="legend-item"><div class="legend-swatch" style="background:#eff3ff;"></div>&lt; 1 500 €</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#bdd7e7;"></div>1 500 – 2 500 €</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#6baed6;"></div>2 500 – 4 000 €</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#2171b5;"></div>4 000 – 6 000 €</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#084594;"></div>&gt; 6 000 €</div>
    </div>
  </aside>

  <div id="map"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { getPrixM2GeoJSON } from "/static/js/api.js";
import { formatEuro, formatNombre, showError } from "/static/js/utils.js";

const map = L.map("map").setView([46.8, 2.4], 6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "© OpenStreetMap",
  maxZoom: 19,
}).addTo(map);

let geojsonLayer = null;

function getPrixColor(prix) {
  if (!prix) return "#e0e0e0";
  if (prix < 1500) return "#eff3ff";
  if (prix < 2500) return "#bdd7e7";
  if (prix < 4000) return "#6baed6";
  if (prix < 6000) return "#2171b5";
  return "#084594";
}

async function chargerCarte() {
  const type  = document.getElementById("filter-type").value;
  const dept  = document.getElementById("filter-dept").value.trim();
  const annee = document.getElementById("filter-annee").value;

  document.getElementById("sidebar-info").innerHTML =
    `<div class="spinner" style="width:24px;height:24px;border-width:2px;margin:0;"></div>`;

  try {
    const params = { type };
    if (dept)  params.departement = dept;
    if (annee) params.annee = annee;

    const geojson = await getPrixM2GeoJSON(params);

    if (geojsonLayer) map.removeLayer(geojsonLayer);

    geojsonLayer = L.geoJSON(geojson, {
      style: (f) => ({
        fillColor:   getPrixColor(f.properties.prix_m2_median),
        fillOpacity: 0.75,
        color:       "#fff",
        weight:      0.8,
      }),
      onEachFeature: (f, layer) => {
        const p = f.properties;
        layer.bindPopup(`
          <div class="popup-title">${p.nom_commune}</div>
          <div class="popup-prix">${formatEuro(p.prix_m2_median)} /m²</div>
          <div class="popup-sub">${formatNombre(p.nb_transactions)} transactions · dept. ${p.departement}</div>
          <a href="/commune?code=${p.commune_code}" style="font-size:.8rem;color:var(--color-primary);">
            Voir analyse →
          </a>
        `);
        layer.on("mouseover", () => layer.setStyle({ fillOpacity: 1 }));
        layer.on("mouseout",  () => layer.setStyle({ fillOpacity: 0.75 }));
      },
    }).addTo(map);

    if (geojsonLayer.getBounds().isValid()) map.fitBounds(geojsonLayer.getBounds());

    const n = geojson.features.length;
    document.getElementById("sidebar-info").innerHTML =
      `<div class="alert alert-info">${formatNombre(n)} commune${n > 1 ? "s" : ""} affichée${n > 1 ? "s" : ""}.</div>`;
    document.getElementById("legend").style.display = "block";

  } catch (err) {
    showError("sidebar-info", err.message);
  }
}

document.getElementById("btn-load").addEventListener("click", chargerCarte);
chargerCarte();
</script>
{% endblock %}
