<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ImmoBI — Analyseur de prix immobilier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>

<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="/">ImmoBI <span>2026</span></a>
      <ul class="nav-links">
        <li><a href="/" class="active">Analyser</a></li>
        <li><a href="/carte">Carte des prix</a></li>
        <li><a href="/commune">Fiche commune</a></li>
        <li><a href="/opportunites">Opportunités</a></li>
        <li><a href="/architecture">Architecture</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>Ce bien est-il au bon prix ?</h1>
      <p>Comparez n'importe quel bien aux transactions réelles du marché, enrichies des données DPE, transport et
        contexte socio-économique.</p>
    </div>
  </div>

  <div class="container" style="padding-top:2rem;padding-bottom:3rem">

    <!-- Formulaire -->
    <div class="card" style="margin-bottom:1.5rem">
      <form id="form"
        style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:1rem;align-items:end">
        <div class="form-group autocomplete-wrap">
          <label>Commune *</label>
          <input id="inp-commune" type="text" placeholder="Lyon, Rennes…" autocomplete="off" required>
          <input id="hid-commune" type="hidden">
        </div>
        <div class="form-group">
          <label>Type de bien *</label>
          <select id="inp-type">
            <option value="Appartement">Appartement</option>
            <option value="Maison">Maison</option>
          </select>
        </div>
        <div class="form-group">
          <label>Surface (m²) *</label>
          <input id="inp-surface" type="number" min="5" max="2000" placeholder="65">
        </div>
        <div class="form-group">
          <label>Nb. pièces</label>
          <input id="inp-pieces" type="number" min="1" max="20" placeholder="3">
        </div>
        <div class="form-group">
          <label>Classe DPE connue</label>
          <select id="inp-dpe">
            <option value="">Inconnue</option>
            <option value="A">A — Très efficace</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
            <option value="F">F</option>
            <option value="G">G — Très énergivore</option>
          </select>
        </div>
        <div class="form-group">
          <label>Classe GES connue</label>
          <select id="inp-ges">
            <option value="">Inconnue</option>
            <option value="A">A — Très sobre</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
            <option value="F">F</option>
            <option value="G">G — Très émetteur</option>
          </select>
        </div>
        <div class="form-group">
          <label>Époque de construction</label>
          <select id="inp-epoque">
            <option value="">Inconnue</option>
            <option value="Avant 1949">Avant 1949</option>
            <option value="1949-1974">1949-1974</option>
            <option value="1975-1989">1975-1989</option>
            <option value="1990-2000">1990-2000</option>
            <option value="2001-2012">2001-2012</option>
            <option value="Après 2012">Après 2012</option>
          </select>
        </div>
        <div class="form-group">
          <label>Zone PEB (Exposition Bruit)</label>
          <select id="inp-peb">
            <option value="">Hors zone (Calme)</option>
            <option value="A">Zone A — Très forte exposition</option>
            <option value="B">Zone B — Forte exposition</option>
            <option value="C">Zone C — Exposition modérée</option>
            <option value="D">Zone D — Faible exposition</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prix demandé (€) <span class="text-muted text-sm">optionnel</span></label>
          <input id="inp-prix" type="number" min="0" placeholder="280 000">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="align-self:end">
          Analyser →
        </button>
      </form>
    </div>

    <!-- Résultat -->
    <div id="result"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module">
    const API = "";
    let charts = {};

    // ── Utilitaires ──────────────────────────────────────────────
    const fmt = n => n == null ? "—" : new Intl.NumberFormat("fr-FR", { style: "currency", currency: "EUR", maximumFractionDigits: 0 }).format(n);
    const fmtN = n => n == null ? "—" : new Intl.NumberFormat("fr-FR").format(n);
    const fmtPct = n => n == null ? "—" : parseFloat(n).toFixed(1) + " %";
    const fmtDate = s => { if (!s) return s; const p = String(s).split(/[-T ]/); const m = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.']; const mo = parseInt(p[1]); return (mo >= 1 && mo <= 12) ? m[mo-1] + ' ' + p[0] : s; };
    const D = id => document.getElementById(id);

    function debounce(fn, ms = 250) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms) } }
    function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id] } }

    async function apiFetch(url, opt = {}) {
      const r = await fetch(API + url, { headers: { "Content-Type": "application/json" }, ...opt });
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || `HTTP ${r.status}`) }
      return r.json();
    }

    // ── Autocomplete commune ─────────────────────────────────────
    const inpCommune = D("inp-commune");
    const hidCommune = D("hid-commune");

    inpCommune.addEventListener("input", debounce(async () => {
      const q = inpCommune.value.trim();
      if (q.length < 2) { closeAC(); return }
      try {
        const res = await apiFetch(`/api/communes/search?q=${encodeURIComponent(q)}`);
        renderAC(res);
      } catch { closeAC() }
    }));
    document.addEventListener("click", e => { if (e.target !== inpCommune) closeAC() });

    function renderAC(items) {
      closeAC();
      if (!items.length) return;
      const ul = document.createElement("ul");
      ul.className = "autocomplete-list";
      items.forEach(it => {
        const li = document.createElement("li");
        li.innerHTML = `${it.nom_commune} <span>(${it.commune_code})</span>`;
        li.addEventListener("click", () => {
          inpCommune.value = it.nom_commune;
          hidCommune.value = it.commune_code;
          localStorage.setItem("selected_commune_code", it.commune_code);
          localStorage.setItem("selected_commune_name", it.nom_commune);
          const dept = it.commune_code.substring(0, 2);
          localStorage.setItem("filter_dept", dept);
          closeAC();
        });
        ul.appendChild(li);
      });
      inpCommune.parentElement.appendChild(ul);
    }
    function closeAC() { inpCommune.parentElement.querySelector(".autocomplete-list")?.remove() }

    // ── Restauration des informations depuis localStorage ─────────
    window.addEventListener("DOMContentLoaded", () => {
      const savedCode = localStorage.getItem("selected_commune_code");
      const savedName = localStorage.getItem("selected_commune_name");
      if (savedCode && savedName) {
        inpCommune.value = savedName;
        hidCommune.value = savedCode;
      }
      
      const savedType = localStorage.getItem("property_type");
      if (savedType) D("inp-type").value = savedType;
      
      const savedSurface = localStorage.getItem("property_surface");
      if (savedSurface) D("inp-surface").value = savedSurface;
      
      const savedPieces = localStorage.getItem("property_pieces");
      if (savedPieces) D("inp-pieces").value = savedPieces;
      
      const savedDpe = localStorage.getItem("property_dpe");
      if (savedDpe) D("inp-dpe").value = savedDpe;

      const savedGes = localStorage.getItem("property_ges");
      if (savedGes) D("inp-ges").value = savedGes;

      const savedEpoque = localStorage.getItem("property_epoque");
      if (savedEpoque) D("inp-epoque").value = savedEpoque;

      const savedPeb = localStorage.getItem("property_peb");
      if (savedPeb) D("inp-peb").value = savedPeb;
      
      const savedPrix = localStorage.getItem("property_prix");
      if (savedPrix) D("inp-prix").value = savedPrix;

      if (savedCode && savedSurface) {
        setTimeout(() => { D("form").requestSubmit(); }, 100);
      }
    });

    // Écouter les changements pour sauvegarder dans localStorage
    D("inp-type").addEventListener("change", e => localStorage.setItem("property_type", e.target.value));
    D("inp-surface").addEventListener("input", e => localStorage.setItem("property_surface", e.target.value));
    D("inp-pieces").addEventListener("input", e => localStorage.setItem("property_pieces", e.target.value));
    D("inp-dpe").addEventListener("change", e => localStorage.setItem("property_dpe", e.target.value));
    D("inp-ges").addEventListener("change", e => localStorage.setItem("property_ges", e.target.value));
    D("inp-epoque").addEventListener("change", e => localStorage.setItem("property_epoque", e.target.value));
    D("inp-peb").addEventListener("change", e => localStorage.setItem("property_peb", e.target.value));
    D("inp-prix").addEventListener("input", e => localStorage.setItem("property_prix", e.target.value));

    // ── Soumission du formulaire ─────────────────────────────────
    D("form").addEventListener("submit", async e => {
      e.preventDefault();
      const code = hidCommune.value;
      if (!code) { showErr("Sélectionnez une commune dans la liste."); return }
      const surface = parseFloat(D("inp-surface").value);
      if (!surface) { showErr("Surface requise."); return }

      D("result").innerHTML = `<div class="spinner"></div><p class="loading-text">Analyse en cours…</p>`;

      const body = { commune_code: code, surface, type_local: D("inp-type").value };
      
      const gesClasse = D("inp-ges").value;
      if (gesClasse) body.ges_classe = gesClasse;
      
      const epoque = D("inp-epoque").value;
      if (epoque) body.epoque = epoque;

      const pebZone = D("inp-peb").value;
      if (pebZone) body.peb_zone = pebZone;

      const prixDemande = parseFloat(D("inp-prix").value) || null;
      if (prixDemande) body.prix_demande = prixDemande;

      try {
        const [est, resume, dpe, transport, tendances, txList] = await Promise.allSettled([
          apiFetch("/api/estimateur", { method: "POST", body: JSON.stringify(body) }),
          apiFetch(`/api/communes/${code}/resume`),
          apiFetch(`/api/analyses/dpe?commune_code=${code}&type=${D("inp-type").value}`),
          apiFetch(`/api/analyses/transport?commune_code=${code}&type=${D("inp-type").value}`),
          apiFetch(`/api/analyses/tendances?commune_code=${code}&type=${D("inp-type").value}`),
          apiFetch(`/api/transactions?commune_code=${code}&per_page=8`),
        ]);

        const data = {
          est: est.status === "fulfilled" ? est.value : null,
          resume: resume.status === "fulfilled" ? resume.value : null,
          dpe: dpe.status === "fulfilled" ? dpe.value : [],
          transport: transport.status === "fulfilled" ? transport.value : [],
          tendances: tendances.status === "fulfilled" ? tendances.value : [],
          txList: txList.status === "fulfilled" ? txList.value : [],
        };

        if (!data.est) { showErr("Pas assez de données pour cette commune. Essayez une ville plus grande."); return }

        // Normaliser les champs numériques
        if (data.resume) {
          data.resume.revenu_median = parseFloat(data.resume.revenu_median) || null;
          data.resume.taux_chomage = parseFloat(data.resume.taux_chomage) || null;
          data.resume.prix_m2_median = parseFloat(data.resume.prix_m2_median) || null;
        }
        data.tendances = data.tendances.map(t => ({ ...t, prix_m2_median: parseFloat(t.prix_m2_median) || null }));
        data.dpe = data.dpe.map(d => ({ ...d, prix_m2_median: parseFloat(d.prix_m2_median) || null }));
        data.transport = data.transport.map(t => ({ ...t, prix_m2_median: parseFloat(t.prix_m2_median) || null }));

        renderResult(data, body, D("inp-dpe").value, prixDemande);
      } catch (err) { showErr(err.message) }
    });

    function showErr(msg) {
      D("result").innerHTML = `<div class="alert alert-error">${msg}</div>`;
    }

    // ── Rendu principal ──────────────────────────────────────────
    function renderResult(data, body, dpeClasse, prixDemande) {
      const { est, resume, dpe, transport, tendances, txList } = data;
      const score = est.score_deal;
      const gesClasse = body.ges_classe || "";
      const epoque = body.epoque || "";
      const pebZone = body.peb_zone || "";
      const pctile = prixDemande ? Math.round((prixDemande / body.surface - est.prix_m2_q25) / (est.prix_m2_q75 - est.prix_m2_q25) * 50 + 25) : null;
      const markerPct = pctile ? Math.max(2, Math.min(98, pctile)) : Math.round((est.prix_m2_median - est.prix_m2_q25) / (est.prix_m2_q75 - est.prix_m2_q25) * 50 + 25);

      // Tendance prix (dernier trimestre vs - 2 ans)
      let tendanceDelta = null, tendancePct = null;
      if (tendances.length >= 4) {
        const last = tendances[tendances.length - 1];
        const old = tendances[Math.max(0, tendances.length - 8)];
        if (last?.prix_m2_median && old?.prix_m2_median) {
          tendanceDelta = last.prix_m2_median - old.prix_m2_median;
          tendancePct = ((tendanceDelta / old.prix_m2_median) * 100).toFixed(1);
        }
      }

      // DPE: impact de la classe connue
      let dpeInsight = "";
      if (dpeClasse && dpe.length > 1) {
        const mediane = dpe.find(d => d.dpe_classe === "D")?.prix_m2_median || est.prix_m2_median;
        const selected = dpe.find(d => d.dpe_classe === dpeClasse);
        if (selected && mediane) {
          const delta = ((selected.prix_m2_median - mediane) / mediane * 100).toFixed(1);
          const sign = delta > 0 ? "+" : "";
          dpeInsight = `Classe ${dpeClasse} : ${sign}${delta}% vs classe D dans cette commune`;
        }
      }

      // Transport: tranche la plus proche
      let transportInsight = "";
      if (transport.length > 0) {
        const near = transport[0];
        const far = transport[transport.length - 1];
        if (near && far && near.prix_m2_median && far.prix_m2_median) {
          const delta = ((near.prix_m2_median - far.prix_m2_median) / far.prix_m2_median * 100).toFixed(0);
          transportInsight = near.tranche_distance === "0-500m"
            ? `Prime gare (< 500m) : +${delta}% vs biens éloignés (>${far.tranche_distance})`
            : `${near.tranche_distance} de la gare · prime proximité : +${delta}%`;
        }
      }

      D("result").innerHTML = `
    <!-- Verdict -->
    ${score ? `
    <div class="verdict ${score}" id="verdict-block">
      <div class="verdict-icon">${score === "excellent" ? "🌟" : score === "bon" ? "✅" : score === "correct" ? "🟡" : "🔴"}</div>
      <div>
        <div class="verdict-title">${score === "excellent" ? "Excellent deal" : score === "bon" ? "Bon prix" : score === "correct" ? "Prix dans la norme" : "Prix au-dessus du marché"}</div>
        <div class="verdict-sub">
          ${score === "excellent" ? "Ce bien est significativement sous-évalué par rapport au marché." :
            score === "bon" ? "Ce bien est légèrement en dessous du prix médian." :
              score === "correct" ? "Le prix est conforme au marché local." :
                "Ce bien est au-dessus du 3ème quartile. Négociation conseillée."}
        </div>
      </div>
      <div class="verdict-badge">${score === "excellent" ? "Excellent" : score === "bon" ? "Bon prix" : score === "correct" ? "Correct" : "Cher"}</div>
    </div>` : ""}

    <div class="grid-2" style="margin-bottom:1.5rem">

      <!-- Colonne gauche : estimation prix -->
      <div class="card">
        <div class="card-title">Estimation de marché</div>
        <div style="font-size:2rem;font-weight:800;color:var(--primary)">${fmt(est.prix_estime)}</div>
        <div style="font-size:.88rem;color:var(--muted);margin-top:.2rem">
          Fourchette : <strong>${fmt(est.fourchette_basse)}</strong> – <strong>${fmt(est.fourchette_haute)}</strong>
        </div>
        <div style="font-size:.82rem;color:var(--muted);margin-top:.2rem">
          Basé sur ${fmtN(est.nb_comparables)} transactions similaires (24 mois)
        </div>

        ${prixDemande ? `
        <!-- Percentile bar -->
        <div class="percentile-wrap mt-2">
          <div class="percentile-label">
            <span>Bon marché</span>
            <span style="font-weight:600">${fmt(prixDemande / body.surface)} /m² demandé</span>
            <span>Cher</span>
          </div>
          <div class="percentile-track">
            <div class="percentile-marker" style="left:${markerPct}%" title="${fmt(prixDemande / body.surface)} /m²"></div>
          </div>
          <div class="percentile-zones">
            <span>P25 · ${fmt(est.prix_m2_q25)}/m²</span>
            <span>Médiane · ${fmt(est.prix_m2_median)}/m²</span>
            <span>P75 · ${fmt(est.prix_m2_q75)}/m²</span>
          </div>
        </div>` : `
        <div class="percentile-wrap mt-2">
          <div class="percentile-label"><span>Marché local (${D("inp-type").value})</span></div>
          <div class="percentile-track">
            <div class="percentile-marker" style="left:50%"></div>
          </div>
          <div class="percentile-zones">
            <span>P25 · ${fmt(est.prix_m2_q25)}/m²</span>
            <span>Médiane · ${fmt(est.prix_m2_median)}/m²</span>
            <span>P75 · ${fmt(est.prix_m2_q75)}/m²</span>
          </div>
        </div>`}

        <!-- Rénovation énergétique / passoire thermique -->
        ${['F', 'G'].includes(dpeClasse) ? `
        <div class="alert alert-warning mt-2" style="background: rgba(239, 128, 35, 0.08); border-left: 4px solid #ef8023; padding: 1rem; border-radius: var(--r); margin-top: 1.25rem; margin-bottom: 0.5rem;">
          <h4 style="color:#ef8023; font-weight:700; margin:0 0 0.4rem 0; font-size: 0.88rem; display:flex; align-items:center; gap:0.4rem;">
            ⚡ Passoire Thermique (Classe ${dpeClasse})
          </h4>
          <p style="font-size:0.78rem; margin:0; line-height:1.4; color: var(--text);">
            <strong>Interdictions de louer (Loi Climat) :</strong> Location interdite pour les logements G depuis 2025, F en <strong>2028</strong> et E en <strong>2034</strong>.
          </p>
          <div style="margin-top:0.75rem; border-top:1px solid rgba(239, 128, 35, 0.2); padding-top:0.6rem; display:flex; justify-content:space-between; align-items:center; font-size:0.78rem;">
            <span>Est. budget travaux (moyen ~450€/m²) :</span>
            <strong style="color:#ef8023; font-weight:700;">${fmt(body.surface * 450)}</strong>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.78rem; margin-top:0.25rem;">
            <span>Budget total (Achat + Rénovation) :</span>
            <strong style="color:var(--text); font-weight:700;">${fmt((prixDemande || est.prix_estime) + (body.surface * 450))}</strong>
          </div>
        </div>` : ""}

        <!-- Facture d'énergie estimée -->
        ${est.facture_energie_est ? `
        <div class="alert alert-info mt-2" style="background: rgba(37, 99, 235, 0.05); border-left: 4px solid var(--primary); padding: 1rem; border-radius: var(--r); margin-top: 1.25rem; margin-bottom: 0.5rem;">
          <h4 style="color:var(--primary); font-weight:700; margin:0 0 0.4rem 0; font-size: 0.88rem; display:flex; align-items:center; gap:0.4rem;">
            🔌 Facture d'Énergie Estimée (Chauffage)
          </h4>
          <p style="font-size:0.78rem; margin:0; line-height:1.4; color: var(--text);">
            Consommation moyenne observée dans la commune : <strong>${est.avg_conso} kWh/m²/an</strong>.
          </p>
          <div style="margin-top:0.75rem; border-top:1px solid rgba(37, 99, 235, 0.2); padding-top:0.6rem; display:flex; justify-content:space-between; align-items:center; font-size:0.78rem;">
            <span>Coût annuel estimé pour ${body.surface} m² :</span>
            <strong style="color:var(--primary); font-weight:800; font-size:1rem;">${fmt(est.facture_energie_est)} / an</strong>
          </div>
          <div style="font-size:0.68rem; color:var(--muted); margin-top:0.25rem; font-style:italic; text-align:right;">
            * Basé sur un tarif moyen de 0.25 €/kWh
          </div>
        </div>` : ""}

        <!-- Stats clés commune -->
        <div class="kpi-strip mt-2" style="grid-template-columns:repeat(3,1fr)">
          <div class="kpi" style="cursor:help;" title="Prix au m² médian calculé sur l'ensemble des transactions réelles dans cette commune.">
            <div class="kpi-val" style="font-size:1.2rem">${fmt(est.prix_m2_median)}</div>
            <div class="kpi-lbl" style="display:flex; align-items:center; justify-content:center; gap:0.25rem;">Prix médian /m² ⓘ</div>
          </div>
          <div class="kpi" style="cursor:help;" title="Revenu disponible médian annuel par ménage (INSEE Filosofi) : 50% des ménages gagnent plus, 50% gagnent moins.">
            <div class="kpi-val" style="font-size:1.2rem">${est.socio.revenu_median ? fmt(est.socio.revenu_median) : "—"}</div>
            <div class="kpi-lbl" style="display:flex; align-items:center; justify-content:center; gap:0.25rem;">Revenu médian ⓘ</div>
          </div>
          <div class="kpi" style="cursor:help;" title="Taux de chômage au sens du recensement INSEE de la population active (15-64 ans) dans la commune.">
            <div class="kpi-val" style="font-size:1.2rem">${est.socio.taux_chomage != null ? fmtPct(est.socio.taux_chomage) : "—"}</div>
            <div class="kpi-lbl" style="display:flex; align-items:center; justify-content:center; gap:0.25rem;">Chômage ⓘ</div>
          </div>
        </div>

        <!-- Proximité & Transports -->
        <div style="margin-top: 1.25rem; border-top: 1px solid var(--border); padding-top: 1rem;">
          <div class="card-title" style="font-size: 0.8rem; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 0.6rem;">Services & Proximité</div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
            <div style="background: var(--bg); border: 1px solid var(--border); padding: 0.6rem; border-radius: var(--r); display: flex; align-items: center; gap: 0.5rem;" title="Minimum observé sur les transactions réelles de la commune">
              <span style="font-size: 1.5rem;">🚂</span>
              <div>
                <div style="font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; gap: 0.2rem;">
                  Gare la plus proche
                  <span style="font-size: 0.65rem; color: var(--muted); cursor: help;">ⓘ</span>
                </div>
                <strong style="font-size: 0.82rem;">${est.proximite.min_dist_gare_m != null ? fmtN(est.proximite.min_dist_gare_m) + ' m' : '—'}</strong>
                <span style="display: block; font-size: 0.68rem; margin-top: 0.15rem; font-weight: 700; color: ${est.proximite.min_dist_gare_m < 500 ? '#16a34a' : est.proximite.min_dist_gare_m < 1500 ? '#d97706' : '#dc2626'}">
                  ${est.proximite.min_dist_gare_m < 500 ? 'À pied (< 500m)' : est.proximite.min_dist_gare_m < 1500 ? 'À vélo (< 1.5km)' : 'Voiture (1.5km+)'}
                </span>
              </div>
            </div>
            <div style="background: var(--bg); border: 1px solid var(--border); padding: 0.6rem; border-radius: var(--r); display: flex; align-items: center; gap: 0.5rem;" title="Minimum observé sur les transactions réelles de la commune">
              <span style="font-size: 1.5rem;">🎓</span>
              <div>
                <div style="font-size: 0.72rem; color: var(--muted); display: flex; align-items: center; gap: 0.2rem;">
                  École la plus proche
                  <span style="font-size: 0.65rem; color: var(--muted); cursor: help;">ⓘ</span>
                </div>
                <strong style="font-size: 0.82rem;">${est.proximite.min_dist_ecole_m != null ? fmtN(est.proximite.min_dist_ecole_m) + ' m' : '—'}</strong>
                <span style="display: block; font-size: 0.68rem; margin-top: 0.15rem; font-weight: 700; color: ${est.proximite.min_dist_ecole_m < 500 ? '#16a34a' : est.proximite.min_dist_ecole_m < 1500 ? '#d97706' : '#dc2626'}">
                  ${est.proximite.min_dist_ecole_m < 500 ? 'À pied (< 500m)' : est.proximite.min_dist_ecole_m < 1500 ? 'À vélo (< 1.5km)' : 'Voiture (1.5km+)'}
                </span>
              </div>
            </div>
          </div>
          <div style="font-size: 0.68rem; color: var(--muted); margin-top: 0.5rem; text-align: center; font-style: italic;">
            * Distances minimales réelles mesurées à partir des biens vendus dans la commune.
          </div>
        </div>

        <!-- Alerte Bruit -->
        ${est.bruit.peb_pct > 0 ? `
        <div class="alert alert-error" style="background: rgba(220, 38, 38, 0.06); border-left: 4px solid #dc2626; padding: 0.75rem; border-radius: var(--r); font-size: 0.78rem; display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; margin-bottom: 0;">
          <span>🔇</span>
          <span style="line-height: 1.4; color: var(--text);">
            Exposition au bruit aérien de l'aéroport <strong>${est.bruit.peb_aeroports}</strong> (${est.bruit.peb_pct}% des transactions locales affectées).
          </span>
        </div>` : ""}

        <div style="margin-top: 1.25rem;">
          <a href="/commune?code=${hidCommune.value}" class="btn btn-outline btn-sm" style="display: block; text-align: center;">
            Analyse complète de ${resume?.nom_commune || "la commune"} →
          </a>
        </div>
      </div>

      <!-- Colonne droite : analyse multi-dimensionnelle -->
      <div>
        <div class="card-title" style="margin-bottom:.75rem;font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">
          Analyse multi-dimensionnelle
        </div>
        <div style="display:flex;flex-direction:column;gap:.6rem">

          <!-- Prix -->
          <div class="dim-card" style="--dim-color:var(--primary)">
            <div class="dim-icon">💰</div>
            <div class="dim-label">Prix</div>
            <div class="dim-value">${fmt(est.prix_m2_median)} /m² médian</div>
            <div class="dim-detail">${prixDemande ? `Demandé : ${fmt(prixDemande / body.surface)} /m²` : `Surface : ${body.surface} m² → ${fmt(est.prix_estime)}`}</div>
            <div class="dim-score ${score === "excellent" || score === "bon" ? "good" : score === "correct" ? "ok" : "bad"}">
              ${score === "excellent" ? "A" : score === "bon" ? "B" : score === "correct" ? "C" : "D"}
            </div>
          </div>

          <!-- Énergie DPE & GES -->
          <div class="dim-card" style="--dim-color:#16a34a">
            <div class="dim-icon">⚡</div>
            <div class="dim-label">Énergie (DPE) & Climat (GES)</div>
            <div class="dim-value">
              ${dpeClasse ? `DPE: Classe ${dpeClasse}` : "DPE inconnu"} 
              ${gesClasse ? `· GES: Classe ${gesClasse}` : ""}
            </div>
            <div class="dim-detail">
              ${gesClasse && est.ges_prix_m2 ? `Impact GES : <strong>${fmt(est.ges_prix_m2)}/m²</strong> (${((est.ges_prix_m2 - est.prix_m2_median) / est.prix_m2_median * 100).toFixed(1)}% vs médiane) · ` : ""}
              ${dpeInsight || (dpe.length ? "Impact énergie disponible — voir fiche commune" : "DPE non disponible")}
            </div>
            <div class="dim-score ${dpeClasse ? (['A', 'B', 'C'].includes(dpeClasse) ? 'good' : ['D', 'E'].includes(dpeClasse) ? 'ok' : 'bad') : 'na'}">
              ${dpeClasse || "?"}
            </div>
          </div>

          <!-- Époque de construction -->
          <div class="dim-card" style="--dim-color:#b45309">
            <div class="dim-icon">🏛️</div>
            <div class="dim-label">Époque de construction</div>
            <div class="dim-value">${epoque ? `Époque ${epoque}` : "Époque non renseignée"}</div>
            <div class="dim-detail">
              ${est.epoque_prix_m2 ? `Prix moyen époque : <strong>${fmt(est.epoque_prix_m2)}/m²</strong> (${((est.epoque_prix_m2 - est.prix_m2_median) / est.prix_m2_median * 100).toFixed(1)}% vs médiane commune)` : "Sélectionnez une époque pour analyser son impact sur le prix"}
            </div>
            <div class="dim-score ${epoque ? 'ok' : 'na'}">
              ${epoque ? '🏛️' : '?'}
            </div>
          </div>

          <!-- Transport -->
          <div class="dim-card" style="--dim-color:#7c3aed">
            <div class="dim-icon">🚂</div>
            <div class="dim-label">Transport & Écoles</div>
            <div class="dim-value">Min : ${est.proximite.min_dist_gare_m != null ? fmtN(est.proximite.min_dist_gare_m) + ' m (Gare)' : 'Non dispo'}</div>
            <div class="dim-detail">Moy. Gare : ${est.proximite.avg_dist_gare_m != null ? fmtN(est.proximite.avg_dist_gare_m) + ' m' : '—'} · École : ${est.proximite.min_dist_ecole_m != null ? fmtN(est.proximite.min_dist_ecole_m) + ' m' : '—'}</div>
            <div class="dim-score ${est.proximite.min_dist_gare_m != null ? (est.proximite.min_dist_gare_m < 500 ? "good" : est.proximite.min_dist_gare_m < 1500 ? "ok" : "bad") : "na"}">
              ${est.proximite.min_dist_gare_m != null ? (est.proximite.min_dist_gare_m < 500 ? "A" : est.proximite.min_dist_gare_m < 1500 ? "B" : "C") : "?"}
            </div>
          </div>

          <!-- Contexte socio -->
          <div class="dim-card" style="--dim-color:#0d9488">
            <div class="dim-icon">🏘️</div>
            <div class="dim-label">Contexte socio-économique</div>
            <div class="dim-value">${est.socio.revenu_median ? fmt(est.socio.revenu_median) + "/an" : "Données manquantes"}</div>
            <div class="dim-detail">${est.socio.taux_chomage != null ? `Chômage : ${fmtPct(est.socio.taux_chomage)} · ` : ""}${est.socio.population ? fmtN(est.socio.population) + " hab." : ""}</div>
            <div class="dim-score ${est.socio.revenu_median ? (est.socio.revenu_median > 25000 ? "good" : est.socio.revenu_median > 18000 ? "ok" : "bad") : "na"}">
              ${est.socio.revenu_median ? (est.socio.revenu_median > 25000 ? "A" : est.socio.revenu_median > 18000 ? "B" : "C") : "?"}
            </div>
          </div>

          <!-- Exposition Bruit & Aéroport (PEB) -->
          <div class="dim-card" style="--dim-color:${pebZone ? (['A', 'B'].includes(pebZone) ? "var(--danger)" : "var(--warning)") : (est.bruit.peb_pct > 0 ? "var(--danger)" : "#16a34a")}">
            <div class="dim-icon">🔇</div>
            <div class="dim-label">Exposition Nuisances Sonores (PEB)</div>
            <div class="dim-value">
              ${pebZone ? `Zone PEB: ${pebZone}` : (est.bruit.peb_pct > 0 ? `${est.bruit.peb_pct}% des biens exposés` : "Hors zone d'exposition")}
            </div>
            <div class="dim-detail">
              ${pebZone && est.peb_prix_m2 ? `Impact PEB ${pebZone} : <strong>${fmt(est.peb_prix_m2)}/m²</strong> (${((est.peb_prix_m2 - est.prix_m2_median) / est.prix_m2_median * 100).toFixed(1)}% vs médiane) · ` : ""}
              ${est.bruit.peb_pct > 0 ? `Zone affectée par l'aéroport <strong>${est.bruit.peb_aeroports}</strong>` : "Cette commune est calme et préservée des nuisances aéroportuaires réglementées"}
            </div>
            <div class="dim-score ${pebZone ? (['A', 'B'].includes(pebZone) ? "bad" : "ok") : (est.bruit.peb_pct > 0 ? (est.bruit.peb_pct > 5 ? "bad" : "ok") : "good")}">
              ${pebZone || (est.bruit.peb_pct > 0 ? (est.bruit.peb_pct > 5 ? "C" : "B") : "A")}
            </div>
          </div>

          <!-- Tendance marché -->
          <div class="dim-card" style="--dim-color:${tendancePct > 0 ? "#d97706" : "#16a34a"}">
            <div class="dim-icon">📈</div>
            <div class="dim-label">Tendance marché</div>
            <div class="dim-value">${tendancePct != null ? `${tendancePct > 0 ? "+" : ""}${tendancePct}% sur 2 ans` : "Données insuffisantes"}</div>
            <div class="dim-detail">${tendances.length ? `${fmtN(tendances.reduce((s, t) => s + (t.nb_transactions || 0), 0))} transactions analysées` : "Historique en cours de chargement"}</div>
            <div class="dim-score ${tendancePct != null ? (parseFloat(tendancePct) > 5 ? "ok" : parseFloat(tendancePct) < -3 ? "good" : "ok") : "na"}">
              ${tendancePct != null ? (parseFloat(tendancePct) > 0 ? "↑" : "↓") : "?"}
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Graphique tendances + transactions comparables -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Évolution du prix médian</div>
        ${tendances.length >= 3 ? `<div style="position:relative;height:320px"><canvas id="chart-tend"></canvas></div>` : `<div class="alert alert-info">Pas assez d'historique pour cette commune.</div>`}
      </div>
      <div class="card">
        <div class="card-title">Transactions récentes comparables</div>
        ${txList.length ? `
        <div class="tx-list" id="tx-list">
          ${txList.slice(0, 6).map(t => `
          <div class="tx-item">
            <div class="tx-type" style="font-size:.8rem">${t.type_local === "Appartement" ? "🏢 Appt" : "🏠 Maison"}</div>
            <div class="tx-address">${t.adresse || "Adresse non disponible"}</div>
            <div class="tx-price">${fmt(t.valeur_fonciere)}</div>
            <div class="tx-m2" style="color:var(--muted)">${t.prix_m2 ? fmtN(t.prix_m2) + " €/m²" : ""}</div>
            ${t.dpe_classe ? `<div class="tx-dpe dpe-${t.dpe_classe}">${t.dpe_classe}</div>` : `<div style="width:22px"></div>`}
          </div>`).join("")}
        </div>`: `<div class="alert alert-info">Aucune transaction récente disponible.</div>`}
      </div>
    </div>
  `;

      // Chart tendances
      if (tendances.length >= 3) {
        setTimeout(() => {
          destroyChart("chart-tend");
          const ctx = D("chart-tend").getContext("2d");
          charts["chart-tend"] = new Chart(ctx, {
            type: "line",
            data: {
              labels: tendances.map(t => fmtDate(t.trimestre)),
              datasets: [{
                label: "Prix médian /m²",
                data: tendances.map(t => t.prix_m2_median),
                borderColor: "#2563eb", backgroundColor: "rgba(37,99,235,.08)",
                fill: true, tension: .3, pointRadius: 4, pointHoverRadius: 6,
              }]
            },
            options: {
              plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => Math.round(ctx.parsed.y).toLocaleString("fr-FR") + " €/m²" } } },
              scales: {
                y: {
                  min: (() => { const v = tendances.map(t => t.prix_m2_median).filter(Boolean); const mn = Math.min(...v), mx = Math.max(...v); const p = (mx - mn) * 0.15 || mn * 0.1; return Math.floor((mn - p) / 100) * 100 })(),
                  max: (() => { const v = tendances.map(t => t.prix_m2_median).filter(Boolean); const mn = Math.min(...v), mx = Math.max(...v); const p = (mx - mn) * 0.15 || mn * 0.1; return Math.ceil((mx + p) / 100) * 100 })(),
                  ticks: { callback: v => v.toLocaleString("fr-FR") + " €", maxTicksLimit: 8 }, grid: { color: "#f0f0f0" }
                }
              },
              responsive: true, maintainAspectRatio: false,
            }
          });
        }, 50);
      }
    }
  </script>
  <script src="/static/js/chat_widget.js" defer></script>
</body>

</html>
