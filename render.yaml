databases:
  - name: sae-2026-db
    plan: free
    databaseName: sae2026
    user: sae2026
    postgresMajorVersion: 16

services:
  - type: web
    name: sae-2026-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "api:app" --workers 2 --timeout 60
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sae-2026-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: FLASK_SECRET_KEY
        generateValue: true
